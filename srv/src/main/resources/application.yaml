
---
spring:
  config:
    activate:
      on-profile: default
  sql:
    init:
      platform: h2
cds:
  data-source:
    auto-config:
      enabled: false
  remote:
    services:
      '[SAPB1]':
        destination:
          name: SAPB1
        type: odata-v4
---
spring:
  devtools:
    restart:
      enabled: false
cds:
  security:
    mock:
      enabled: false
    authentication:
      auth-config:
        enabled: false
  data-source:
    auto-config:
      enabled: false
management:
  endpoint:
    health:
      show-components: always
      probes:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health
  health:
    defaults:
      enabled: false
    ping:
      enabled: true
    db:
      enabled: true
