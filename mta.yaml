_schema-version: 3.3.0
ID: B1EnterpriceApplication
version: 1.0.0
description: CAP Java + Fiori Apps

parameters:
  deploy_mode: html5-repo
  enable-parallel-deployments: true

modules:

  # =========================
  # CAP JAVA SERVICE
  # =========================
  - name: B1EnterpriceApplication-srv
    type: java
    path: srv
    parameters:
      buildpack: sap_java_buildpack_jakarta
      instances: 1
    properties:
      SPRING_PROFILES_ACTIVE: cloud
      JBP_CONFIG_SAP_MACHINE_JRE: "{ version: 21.+ }"
    build-parameters:
      builder: custom
      commands:
        - mvn clean package -DskipTests=true
      build-result: target/*-exec.jar
    requires:
      - name: B1EnterpriceApplication-auth
      - name: B1EnterpriceApplication-connectivity
      - name: B1EnterpriceApplication-destination
    provides:
      - name: srv-api
        properties:
          srv-url: ${default-url}

  # =========================
  # HTML5 APP HOST DEPLOYER
  # =========================
  - name: B1EnterpriceApplication-app-content
    type: com.sap.application.content
    path: .
    requires:
      - name: B1EnterpriceApplication-html5-repo-host
    build-parameters:
      build-result: resources
      requires:

        - name: businesspartners
          artifacts:
            - businesspartners.zip
          target-path: resources/

        - name: itemmaster
          artifacts:
            - itemmaster.zip
          target-path: resources/

        - name: purchaseorder
          artifacts:
            - purchaseorder.zip
          target-path: resources/

  # =========================
  # UI5 APP - Business Partners
  # =========================
  - name: businesspartners
    type: html5
    path: app/businesspartners
    build-parameters:
      builder: custom
      commands:
        - npm install
        - npm run build:cf
      build-result: dist
      supported-platforms:
      - CF

  # =========================
  # UI5 APP - Item Master
  # =========================
  - name: itemmaster
    type: html5
    path: app/item_master
    build-parameters:
      builder: custom
      commands:
        - npm install
        - npm run build:cf
      build-result: dist
      supported-platforms:
      - CF

  # =========================
  # UI5 APP - Purchase Order
  # =========================
  - name: purchaseorder
    type: html5
    path: app/purchase_order
    build-parameters:
      builder: custom
      commands:
        - npm install
        - npm run build:cf
      build-result: dist
      supported-platforms:
      - CF


resources:

  # =========================
  # XSUAA
  # =========================
  - name: B1EnterpriceApplication-auth
    type: org.cloudfoundry.managed-service
    parameters:
      service: xsuaa
      service-plan: application
      path: ./xs-security.json
      config:
        xsappname: B1EnterpriceApplication-${org}-${space}
        tenant-mode: dedicated

  # =========================
  # HANA HDI (optional)
  # =========================
  - name: B1EnterpriceApplication-db
    type: com.sap.xs.hdi-container
    parameters:
      service: hana
      service-plan: hdi-shared

  # =========================
  # Connectivity
  # =========================
  - name: B1EnterpriceApplication-connectivity
    type: org.cloudfoundry.managed-service
    parameters:
      service: connectivity
      service-plan: lite

  # =========================
  # Destination
  # =========================
  - name: B1EnterpriceApplication-destination
    type: org.cloudfoundry.managed-service
    parameters:
      service: destination
      service-plan: lite
      config:
        HTML5Runtime_enabled: true
        init_data:
          instance:
            existing_destinations_policy: update
            destinations:
              - Name: SAPB1
                URL: https://htpc19835d03.cloudiax.com:50000/b1s/v2
                Type: HTTP
                ProxyType: Internet
                Authentication: BasicAuthentication

  # =========================
  # HTML5 Repo Host
  # =========================
  - name: B1EnterpriceApplication-html5-repo-host
    type: org.cloudfoundry.managed-service
    parameters:
      service: html5-apps-repo
      service-plan: app-host

  # =========================
  # HTML5 Repo Runtime
  # =========================
  - name: B1EnterpriceApplication-html5-repo-runtime
    type: org.cloudfoundry.managed-service
    parameters:
      service: html5-apps-repo
      service-plan: app-runtime