_schema-version: 3.3.0
ID: B1EnterpriceApplication
version: 1.0.0-SNAPSHOT
description: "A simple CAP project."
parameters:
  enable-parallel-deployments: true
  deploy_mode: html5-repo
modules:
  - name: B1EnterpriceApplication-srv
    type: java
    path: srv
    parameters:
      instances: 1
      buildpack: sap_java_buildpack_jakarta
    properties:
      SPRING_PROFILES_ACTIVE: cloud,sandbox
      JBP_CONFIG_COMPONENTS: "jres: ['com.sap.xs.java.buildpack.jre.SAPMachineJRE']"
      JBP_CONFIG_SAP_MACHINE_JRE: '{ version: 21.+ }'
    build-parameters:
      builder: custom
      commands:
        - mvn clean package -DskipTests=true --batch-mode
      build-result: target/*-exec.jar
    provides:
      - name: srv-api # required by consumers of CAP services (e.g. approuter)
        properties:
          srv-url: ${default-url}
    requires:
      - name: B1EnterpriceApplication-db
      - name: B1EnterpriceApplication-auth
      - name: B1EnterpriceApplication-connectivity
      - name: B1EnterpriceApplication-destination

  - name: B1EnterpriceApplication-db-deployer
    type: hdb
    path: db
    parameters:
      buildpack: nodejs_buildpack
    build-parameters:
      builder: custom
      commands:
        - npm run build
    requires:
      - name: B1EnterpriceApplication-db

  - name: B1EnterpriceApplication-app-deployer
    type: com.sap.application.content
    path: .
    build-parameters:
      build-result: resources
      requires:
        - name: B1EnterpriceApplicationbusinesspartners
          artifacts:
            - businesspartners.zip
          target-path: resources
        - name: B1EnterpriceApplicationitem_master
          artifacts:
            - item_master.zip
          target-path: resources
        - name: B1EnterpriceApplicationpurchase_order
          artifacts:
            - purchase_order.zip
          target-path: resources
    requires:
      - name: B1EnterpriceApplication-auth
      - name: srv-api
      - name: B1EnterpriceApplication-html5-repo-host
        parameters:
          content-target: true
          config:
            HTML5Runtime_enabled: true

  - name: B1EnterpriceApplicationbusinesspartners
    type: html5
    path: app/businesspartners
    build-parameters:
      build-result: dist
      builder: custom
      commands:
        - npm install
        - npm run build
      supported-platforms:
        []
  - name: B1EnterpriceApplicationitem_master
    type: html5
    path: app/item_master
    build-parameters:
      build-result: dist
      builder: custom
      commands:
        - npm install
        - npm run build
      supported-platforms:
        []
  - name: B1EnterpriceApplicationpurchase_order
    type: html5
    path: app/purchase_order
    build-parameters:
      build-result: dist
      builder: custom
      commands:
        - npm install
        - npm run build
      supported-platforms:
        []

  - name: B1EnterpriceApplication
    type: approuter.nodejs
    path: app/router
    parameters:
      keep-existing-routes: true
      disk-quota: 256M
      memory: 256M
    requires:
      - name: srv-api
        group: destinations
        properties:
          name: srv-api # must be used in xs-app.json as well
          url: ~{srv-url}
          forwardAuthToken: true
      - name: B1EnterpriceApplication-auth
      - name: B1EnterpriceApplication-destination
      - name: B1EnterpriceApplication-html5-runtime
    provides:
      - name: app-api
        properties:
          app-protocol: ${protocol}
          app-uri: ${default-uri}
          url: ${default-url}

resources:
  - name: B1EnterpriceApplication-db
    type: com.sap.xs.hdi-container
    parameters:
      service: hana
      service-plan: hdi-shared
  - name: B1EnterpriceApplication-auth
    type: org.cloudfoundry.managed-service
    parameters:
      service: xsuaa
      service-plan: application
      path: ./xs-security.json
      config:
        xsappname: B1EnterpriceApplication-${org}-${space}
        tenant-mode: dedicated
        oauth2-configuration:
          credential-types:
            - "binding-secret"
            - "x509"
          redirect-uris:
            - https://*~{app-api/app-uri}/**
    requires:
      - name: app-api
  - name: B1EnterpriceApplication-connectivity
    type: org.cloudfoundry.managed-service
    parameters:
      service: connectivity
      service-plan: lite
  - name: B1EnterpriceApplication-destination
    type: org.cloudfoundry.managed-service
    parameters:
      service: destination
      service-plan: lite
      config:
        HTML5Runtime_enabled: true
        init_data:
          instance:
            existing_destinations_policy: update
            destinations:
              - Name: ui5
                URL: https://ui5.sap.com
                Type: HTTP
                ProxyType: Internet
                Authentication: NoAuthentication

  - name: B1EnterpriceApplication-html5-repo-host
    type: org.cloudfoundry.managed-service
    parameters:
      service: html5-apps-repo
      service-plan: app-host
  - name: B1EnterpriceApplication-html5-runtime
    type: org.cloudfoundry.managed-service
    parameters:
      service: html5-apps-repo
      service-plan: app-runtime
